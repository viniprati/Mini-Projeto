<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | Vinicius Prati</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <a href="../index.html" class="logo-link">
                    <img src="../images/github.png" alt="GitHub">
                    <strong>Vinicius Prati</strong>
                </a>
            </div>
            <ul>
                <li><a href="../index.html">In&iacute;cio</a></li>
                <li><a href="../index.html#servicos">Servi&ccedil;os</a></li>
                <li><a href="./pacotes.html">Pacotes</a></li>
                <li><a href="./sobre.html">Sobre</a></li>
                <li><a href="./contato.html" class="cta-button">Fazer Or&ccedil;amento</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="contato">
            <h2>Vamos tirar seu projeto do papel?</h2>
            <p>Preencha o formulário ou me chame diretamente no Discord.</p>
            
            <form action="#" method="POST" class="form-contato">
                <div class="form-grid">
                    <div class="form-field">
                        <label for="nome">Nome completo</label>
                        <input id="nome" type="text" name="nome" placeholder="Ex: Vinicius Prati" minlength="3" maxlength="80" autocomplete="name" required>
                    </div>

                    <div class="form-field">
                        <label for="email">E-mail</label>
                        <input id="email" type="email" name="email" placeholder="voce@empresa.com" autocomplete="email" required>
                    </div>

                    <div class="form-field">
                        <label for="telefone">Telefone (WhatsApp)</label>
                        <input id="telefone" type="tel" name="telefone" placeholder="(27) 99999-9999" pattern="^\(?\d{2}\)?\s?\d{4,5}-?\d{4}$" autocomplete="tel-national" required>
                    </div>

                    <div class="form-field">
                        <label for="servico">Tipo de serviço</label>
                        <select id="servico" name="servico" required>
                            <option value="" disabled selected>Selecione uma opção</option>
                            <option value="web">Desenvolvimento Web</option>
                            <option value="bot">Bot para Discord</option>
                            <option value="web-bot">Web + Bot Integrado</option>
                            <option value="outro">Outro</option>
                        </select>
                    </div>

                    <div class="form-field">
                        <label for="orcamento">Faixa de orçamento</label>
                        <select id="orcamento" name="orcamento" required>
                            <option value="" disabled selected>Selecione uma faixa</option>
                            <option value="ate-1000">Até R$ 1.000</option>
                            <option value="1000-3000">R$ 1.000 a R$ 3.000</option>
                            <option value="3000-7000">R$ 3.000 a R$ 7.000</option>
                            <option value="7000-mais">Acima de R$ 7.000</option>
                        </select>
                    </div>

                    <div class="form-field">
                        <label for="prazo">Prazo desejado</label>
                        <input id="prazo" type="date" name="prazo" required>
                    </div>
                </div>

                <div class="form-field">
                    <label for="mensagem">Detalhes do projeto</label>
                    <textarea id="mensagem" name="mensagem" placeholder="Me conte objetivo, funcionalidades e referências..." minlength="20" maxlength="1200" required></textarea>
                </div>

                <div class="form-field checkbox-field">
                    <input id="aceite" type="checkbox" name="aceite" required>
                    <label for="aceite">Concordo com o uso dos meus dados para retorno de contato.</label>
                </div>

                <button type="submit" class="btn-submit">Enviar Proposta</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Vinicius Prati - Todos os direitos reservados.</p>
        <div class="social-links">
            <a href="https://github.com/viniprati">GitHub</a>
            <a href="https://www.linkedin.com/in/vinicius-prati/">LinkedIn</a>
            <a href="https://discord.com/users/983870132063453235">Discord</a>
        </div>
    </footer>
</body>
</html>
